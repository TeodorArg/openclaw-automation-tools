# Local Codex coordination config for this repository.
model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"

# Keep this repo in low-friction mode; use `never` to avoid repeat approval prompts for routine repo work.
#approval_policy = "on-request"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
network_access = true

[mcp_servers.memory]
command = "npx"
args = [ "-y", "@modelcontextprotocol/server-memory@2025.8.4" ]

[mcp_servers.memory.env]
MEMORY_FILE_PATH = "memory.jsonl"

[mcp_servers.memory.tools.read_graph]
approval_mode = "approve"

[mcp_servers.memory.tools.search_nodes]
approval_mode = "approve"

[mcp_servers.memory.tools.create_entities]
approval_mode = "approve"

[mcp_servers.memory.tools.add_observations]
approval_mode = "approve"

[mcp_servers.memory.tools.delete_observations]
approval_mode = "approve"

[mcp_servers.memory.tools.open_nodes]
approval_mode = "approve"

#[mcp_servers.filesystem]
#command = "npx"
#args = [ "-y", "@modelcontextprotocol/server-filesystem", "/Users/svarnoy85/teodorArg/openclaw-automation-tools"]

[features]
# Enables local Codex sub-agent delegation; role briefs live in `.codex/subagents/`.
multi_agent = true
