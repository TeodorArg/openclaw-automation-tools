name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  plugin-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Keep this matrix in lockstep with the live publishable plugin package list
        # defined in docs/PLUGIN_PACKAGE_CANON.md.
        package:
          - openclaw-host-git-workflow
          - openclaw-workflow-planner
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm pack:smoke

  skill-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - memory-hygiene
          - source-of-truth-fix
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f "${{ matrix.package }}/SKILL.md"
          test -f "${{ matrix.package }}/README.md"
          test -f "${{ matrix.package }}/LICENSE"
      - name: Check license and metadata baseline
        run: |
          grep -Fq "MIT No Attribution" "${{ matrix.package }}/LICENSE"
          grep -Fq -- "- slug: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- display name: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- owner: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- version: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- tags: " "${{ matrix.package }}/README.md"
      - name: Check forbidden runtime files
        run: |
          test ! -f "${{ matrix.package }}/package.json"
          test ! -f "${{ matrix.package }}/openclaw.plugin.json"
          test ! -d "${{ matrix.package }}/src"
