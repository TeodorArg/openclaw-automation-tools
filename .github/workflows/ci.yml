name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  plugin-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-git-workflow
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: openclaw-git-workflow/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm pack:smoke

  plugin-shell-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash -n openclaw-git-workflow/scripts/git-create-branch.sh
      - run: bash -n openclaw-git-workflow/scripts/git-create-commit.sh

  skill-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - memory-hygiene
          - source-of-truth-fix
          - openclaw-host-git-pr
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f "${{ matrix.package }}/SKILL.md"
          test -f "${{ matrix.package }}/README.md"
          test -f "${{ matrix.package }}/LICENSE"
      - name: Check license and metadata baseline
        run: |
          grep -Fq "MIT No Attribution" "${{ matrix.package }}/LICENSE"
          grep -Fq -- "- slug: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- display name: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- owner: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- version: " "${{ matrix.package }}/README.md"
          grep -Fq -- "- tags: " "${{ matrix.package }}/README.md"
      - name: Check forbidden runtime files
        run: |
          test ! -f "${{ matrix.package }}/package.json"
          test ! -f "${{ matrix.package }}/openclaw.plugin.json"
          test ! -d "${{ matrix.package }}/src"

  host-git-lane:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f host-git-lane/README.md
      - run: test -f host-git-lane/HOST_GIT_BOUNDARY.md
      - run: test -f host-git-lane/HOST_PATHS_AND_REPO_RESOLUTION.md
      - run: test -f host-git-lane/GITHUB_AUTH_AND_PR_FLOW.md
      - run: test -f host-git-lane/CANONICAL_REFS.md
      - run: test ! -f host-git-lane/package.json
      - run: test ! -f host-git-lane/openclaw.plugin.json
