name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:

jobs:
  plugin-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Keep this matrix in lockstep with the live publishable plugin package list
        # defined in docs/PLUGIN_PACKAGE_CANON.md.
        package:
          - openclaw-host-git-workflow
          - openclaw-workflow-planner
          - openclaw-canon
          - openclaw-session-bloat-warning
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ${{ matrix.package }}/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm pack:smoke
